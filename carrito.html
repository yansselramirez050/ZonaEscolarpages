<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito Escolar</title>

    <link rel="stylesheet" href="carrito.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <nav>

        <div class="Logo">
            <i class="fa-solid fa-graduation-cap"></i>
            SchoolShop
        </div>

        <div class="menu">

            <a href="trabajo.html">Inicio</a>
            <i class="fa-solid fa-house"></i>

            <a href="Catalogo.html">Catálogo</a>
            <i class="fa-solid fa-book"></i>

            <a href="pro.html">Carrito</a>
            <i class="fa-solid fa-cart-shopping"></i>

        </div>

    </nav>


    <header>

        <h1>
            <i class="fa-solid fa-cart-shopping"></i>
            Carrito Escolar
        </h1>

    </header>


    <div class="carrito">

        

        <div class="producto">

            <img src="cuaderno.jpeg" alt="Cuadernos">

            <div class="info">

                <h2>Cuadernos</h2>

                <p>Cantidad del producto</p>

                <div class="cantidad">

                    <select>
                        <option value=""></option>
                        <option value="">1</option>
                        <option value="">2</option>
                        <option value="">3</option>
                        <option value="">4</option>
                        <option value="">5</option>
                        <option value="">Otra cantidad</option>
                    </select>

                </div>

            </div>

            <div class="acciones">

                <h3>RD$120</h3>

                <button class="a">
                    Comprar
                </button>

            </div>

        </div>

    

        <div class="producto">

            <img src="Mochila.jpeg" alt="Mochila Escolar">

            <div class="info">

                <h2>Mochila Escolar</h2>

                <p>Cantidad del producto</p>

                <div class="cantidad">

                    <select>
                        <option value=""></option>
                        <option value="">1</option>
                        <option value="">2</option>
                        <option value="">3</option>
                        <option value="">4</option>
                        <option value="">5</option>
                        <option value="">Otra cantidad</option>
                    </select>

                </div>

            </div>

            <div class="acciones">

                <h3>RD$4,500</h3>

                <button class="a">
                    Comprar
                </button>

            </div>

        </div>


        <div class="producto">

            <img src="colores.jpeg" alt="Lápices de colores">

            <div class="info">

                <h2>Lápices de Colores</h2>

                <p>Cantidad del producto</p>

                <div class="cantidad">

                    <select>
                        <option value=""></option>
                        <option value="">1</option>
                        <option value="">2</option>
                        <option value="">3</option>
                        <option value="">4</option>
                        <option value="">5</option>
                        <option value="">Otra cantidad</option>
                    </select>

                </div>

            </div>

            <div class="acciones">

                <h3>RD$250</h3>

                <button class="a">
                    Comprar
                </button>

            </div>

        </div>

        <div class="total">

            <h2>Total: RD$4,870</h2>

            <button class="fin">
                Finalizar compra
            </button>

        </div>

    </div>

    <footer class="menu2">

    <a href="proyecto final.html">
        <i class="fa-solid fa-phone"></i>
        Contactos
    </a>

    <a href="fre.html">
        <i class="fa-solid fa-file-pen"></i>
        Formulario De Pedidos
    </a>

</footer>

</body>
</html>
